<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Login to manage your resumes</p>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input id="email" type="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input id="password" type="password" placeholder="********" required>
                </div>
                <p id="loginMessage" style="display:none; margin:0; font-size:14px;"></p>
                <button type="submit" class="primary-btn auth-btn">Sign In</button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const message = document.getElementById('loginMessage');

        // If a valid session already exists, skip login page.
        fetch('/api/auth/me')
            .then(response => {
                if (response.ok) {
                    window.location.replace('dashboard.html');
                }
            })
            .catch(() => {
                // Ignore. User is likely not logged in yet.
            });

        function setMessage(text, isError) {
            message.style.display = 'block';
            message.style.color = isError ? '#b91c1c' : '#166534';
            message.textContent = text;
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const payload = {
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                let result = {};
                const responseText = await response.text();
                try {
                    result = responseText ? JSON.parse(responseText) : {};
                } catch (parseError) {
                    console.error('Login response parse error:', parseError);
                }

                if (!response.ok) {
                    setMessage(result.error || result.message || 'Login failed. Please check your email/password.', true);
                    return;
                }

                localStorage.setItem('loggedInUserName', result.fullName || 'User');
                localStorage.setItem('loggedInUserEmail', result.email || payload.email);

                setMessage('Login successful. Redirecting...', false);
                const encodedName = encodeURIComponent(result.fullName || 'User');
                window.location.replace('dashboard.html?name=' + encodedName);
            } catch (error) {
                console.error(error);
                setMessage('Server error. Please check if backend is running.', true);
            }
        });
    </script>
</body>
</html>
