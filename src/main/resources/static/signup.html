<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Create an Account</h2>
                <p>Start building your professional resume</p>
            </div>
            <form id="signupForm" class="auth-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input id="fullName" type="text" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input id="email" type="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input id="password" type="password" placeholder="Create a strong password" minlength="6" required>
                </div>
                <p id="signupMessage" style="display:none; margin:0; font-size:14px;"></p>
                <button type="submit" class="primary-btn auth-btn">Create Account</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        const message = document.getElementById('signupMessage');

        function setMessage(text, isError) {
            message.style.display = 'block';
            message.style.color = isError ? '#b91c1c' : '#166534';
            message.textContent = text;
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const payload = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (!response.ok) {
                    setMessage(result.error || 'Registration failed', true);
                    return;
                }

                setMessage('Account created successfully. Redirecting to login...', false);
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 900);
            } catch (error) {
                console.error(error);
                setMessage('Server error. Please check if backend is running.', true);
            }
        });
    </script>
</body>
</html>
